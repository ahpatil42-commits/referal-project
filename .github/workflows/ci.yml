name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─── Job 1: TypeScript & Lint ─────────────────────────────────────────────
  typecheck:
    name: TypeScript & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: |
          npx prisma generate
          npx prisma generate --schema=prisma-analytics/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/referralai_test' }}
          ANALYTICS_DATABASE_URL: ${{ secrets.ANALYTICS_DATABASE_URL || '' }}

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ─── Job 2: Playwright E2E Tests ──────────────────────────────────────────
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: typecheck

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: referralai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma clients and push schema
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/referralai_test

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          AUTH_SECRET: ci-test-secret-at-least-32-characters-long
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/referralai_test
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          # Optional services — tests that require these are skipped if not set
          GEMINI_API_KEY: ''
          RESEND_API_KEY: ''
          PUSHER_APP_ID: ''
          PUSHER_SECRET: ''
          NEXT_PUBLIC_PUSHER_KEY: ''
          NEXT_PUBLIC_PUSHER_CLUSTER: ''
          REDIS_URL: ''
          STRIPE_SECRET_KEY: ''
          STRIPE_WEBHOOK_SECRET: ''
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ''

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
